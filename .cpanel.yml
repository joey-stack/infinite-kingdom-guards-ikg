---
deployment:
  tasks:
    - export DEPLOYPATH=/home1/wisdohkr/infinitekingdomguards.com/
    - /bin/cp dist/index.html $DEPLOYPATH/index.html
    - /bin/cp -rf dist/assets $DEPLOYPATH/
    - /bin/chmod 755 $DEPLOYPATH
    - /bin/find $DEPLOYPATH/assets -type d -exec chmod 755 {} \;
    - /bin/find $DEPLOYPATH/assets -type f -exec chmod 644 {} \;
