---
deployment:
  tasks:
    - /bin/echo "Starting deployment..."
    - /bin/cp -ra dist/. /home1/wisdohkr/public_html/
    - /bin/rm -f /home1/wisdohkr/public_html/index.tsx
    - /bin/rm -rf /home1/wisdohkr/public_html/components
    - /bin/rm -rf /home1/wisdohkr/public_html/hooks
    - /bin/rm -rf /home1/wisdohkr/public_html/utils
    - /bin/chmod 755 /home1/wisdohkr/public_html
    - /bin/find /home1/wisdohkr/public_html -type d -exec chmod 755 {} \;
    - /bin/find /home1/wisdohkr/public_html -type f -exec chmod 644 {} \;
    - /bin/echo "Deployment complete."
